/* ════════════════════════════════════════════════════════════════════════
   CONFIGURATION — À PERSONNALISER POUR TON COMPTE
   ────────────────────────────────────────────────────────────────────────
   • CF_WORKER_URL : l'URL de TON Worker Cloudflare (déploie cloudflare_worker_v39.js)
   • CF_AUTH_KEY   : le secret partagé défini dans les variables du Worker (AUTH_KEY)
   La clé d'API FMP ne vit PAS ici : elle est stockée côté Worker
   (variable secrète FMP_API_KEY). Le front n'appelle jamais FMP directement.
   ════════════════════════════════════════════════════════════════════════ */
const CF_WORKER_URL = "https://blue-firefly-2075watchlist-api.john-creusot.workers.dev"; // ton worker (sans slash final)
const CF_AUTH_KEY   = "watchlist";                                                       // = AUTH_KEY défini dans Cloudflare
const APP_VERSION   = "v1.01";

/* ─── THÈME (repris de l'app d'origine — dark financier) ─────────────────── */
const C = {
  bg:"#07080D", bg0:"#07080D", bg1:"#0E1118", bg2:"#141820", bg3:"#1C2130",
  border:"#252D3D", border2:"#2E3A50",
  btc:"#F7931A", blue:"#1E40AF", teal:"#0EA5E9", gold:"#EAB308",
  purple:"#8B5CF6", green:"#10B981", red:"#EF4444", orange:"#F97316", gray:"#6B7280",
  text:"#F1F5F9", text2:"#9CA3AF", text3:"#4B5563",
};

/* ─── Mappings (repris de l'app d'origine) ───────────────────────────────── */
const YF_MAP = {
  BTC:"BTC-USD", ETH:"ETH-USD", SOL:"SOL-USD", BNB:"BNB-USD", XRP:"XRP-USD",
  ADA:"ADA-USD", DOGE:"DOGE-USD", DOT:"DOT-USD", AVAX:"AVAX-USD", LINK:"LINK-USD",
  UNI:"UNI-USD", LTC:"LTC-USD", ATOM:"ATOM-USD", HYPE:"HYPE-USD",
  GOLD:"GOLD.PA", AI:"AI.PA", JEDI:"JEDI.L", AVIO:"AVIO.MI",
};
const CG_MAP = {
  BTC:"bitcoin", ETH:"ethereum", SOL:"solana", BNB:"binancecoin", XRP:"ripple",
  ADA:"cardano", DOGE:"dogecoin", DOT:"polkadot", AVAX:"avalanche-2",
  LINK:"chainlink", UNI:"uniswap", LTC:"litecoin", ATOM:"cosmos", HYPE:"hyperliquid",
};
const FLAG = { US:"🇺🇸", GB:"🇬🇧", FR:"🇫🇷", IT:"🇮🇹", DE:"🇩🇪", NL:"🇳🇱", BE:"🇧🇪",
  CA:"🇨🇦", AU:"🇦🇺", HK:"🇭🇰", CN:"🇨🇳", JP:"🇯🇵", FX:"💱", CRYPTO:"₿" };
const TF_CONFIG = [
  { label:"1J",  interval:"1h",  range:"5d"  },
  { label:"1S",  interval:"1d",  range:"1mo" },
  { label:"1M",  interval:"1d",  range:"3mo" },
  { label:"1A",  interval:"1wk", range:"1y"  },
  { label:"5A",  interval:"1mo", range:"5y"  },
  { label:"ALL", interval:"3mo", range:"max" },
];
const EU_SUFFIXES = [".PA",".MI",".AS",".BR",".DE",".F",".HA",".L",".SW",".CO",".ST",".MC",".AMS"];

const isCryptoEntry = e => !!CG_MAP[e.ticker] || e.cat === "Crypto" ||
  (e.yahooSym && e.yahooSym.toUpperCase().endsWith("-USD"));

/* ─── Persistance : localStorage (offline) + Cloudflare KV (cloud) ───────── */
const STORE_KEY = "gdb_watchlist_v1";
let memStore = null; // fallback mémoire (aperçu Claude : localStorage bloqué)

function readLocal(){
  try { const raw = localStorage.getItem(STORE_KEY); if(raw) return JSON.parse(raw); }
  catch(e){}
  return memStore;
}
function writeLocal(state){
  const safe = { ...state, t: Date.now() };
  try { localStorage.setItem(STORE_KEY, JSON.stringify(safe)); }
  catch(e){ memStore = safe; }
  // Sync best-effort vers Cloudflare KV (clé gdb_watchlist — worker v39)
  fetch(CF_WORKER_URL + "/write-bases", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "X-Auth-Key":CF_AUTH_KEY },
    body: JSON.stringify({ gdb_watchlist: safe }),
    signal: AbortSignal.timeout(10000),
  }).catch(()=>{});
  return safe;
}

/* ─── Helpers worker ─────────────────────────────────────────────────────── */
async function cf(path, opts){
  let res;
  try {
    res = await fetch(CF_WORKER_URL + path, {
      headers: { "X-Auth-Key": CF_AUTH_KEY, ...(opts && opts.headers || {}) },
      signal: AbortSignal.timeout((opts && opts.timeout) || 12000),
      ...(opts || {}),
    });
  } catch(e){
    // réseau / timeout / DNS / CORS
    const reason = e.name === "TimeoutError" ? "délai dépassé" : (e.message || e.name);
    throw new Error("Worker injoignable (" + reason + ") · " + path);
  }
  const txt = await res.text();
  let body;
  try { body = JSON.parse(txt); } catch(e){ body = { _raw: (txt||"").slice(0,300) }; }
  if(body && typeof body === "object"){ body._status = res.status; body._path = path; }
  // Erreur HTTP sans champ error explicite (ex: 404, 500 bruts)
  if(!res.ok && body && !body.error){
    body.error = "HTTP " + res.status + (body._raw ? " · " + body._raw : "");
  }
  return body;
}

/* ─── Formatage ──────────────────────────────────────────────────────────── */
const sym = cur => ({USD:"$",EUR:"€",GBP:"£",GBp:"£",JPY:"¥",CAD:"CA$",AUD:"A$"}[cur] || cur || "$");
const fmtPrice = (v, cur) => v == null ? "—" :
  sym(cur) + (v >= 100 ? Math.round(v).toLocaleString("fr-FR") : v.toFixed(2));
const fmtPct = v => v == null ? "—" : (v >= 0 ? "+" : "") + (v*100).toFixed(2) + "%";
const fmtAmt = (v, cur) => v == null ? "—" :
  (v>=0?"+":"") + sym(cur) + (Math.abs(v)>=100 ? Math.round(Math.abs(v)).toLocaleString("fr-FR") : Math.abs(v).toFixed(2));
const fmtBig = (v, s) => {
  if(v == null) return null;
  if(v >= 1e12) return s + (v/1e12).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2}) + " Bil.";
  if(v >= 1e9)  return s + (v/1e9).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2}) + " Mrd.";
  if(v >= 1e6)  return s + (v/1e6).toLocaleString("fr-FR",{maximumFractionDigits:0}) + " M";
  return s + v.toLocaleString("fr-FR");
};
const fmtVol = v => {
  if(!v) return null;
  if(v >= 1e6) return (v/1e6).toLocaleString("fr-FR",{minimumFractionDigits:1,maximumFractionDigits:1}) + "M";
  if(v >= 1e3) return (v/1e3).toLocaleString("fr-FR",{maximumFractionDigits:0}) + "k";
  return v.toLocaleString("fr-FR");
};
const normPrice = (v, cur) => v == null ? null : (cur === "GBp" ? v/100 : v);
const cvPrice = (v, cur, eur, usdEur) => {
  const n = normPrice(v, cur); if(n == null) return null;
  if(eur && cur !== "EUR" && cur !== "GBp") return n * usdEur;
  return n;
};

/* ════════════════════════════════════════════════════════════════════════
   RECHERCHE — identique au module Achat de l'app d'origine
   ════════════════════════════════════════════════════════════════════════ */
function TickerSearch({ onSelect }){
  const [query, setQuery]     = useState("");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState(null);
  const timer = useRef(null);

  const doSearch = (q) => {
    const q2 = (q != null ? q : query).trim();
    if(!q2 || q2.length < 2){ setResults([]); return; }
    setLoading(true); setError(null);
    cf("/search?q=" + encodeURIComponent(q2), { timeout:8000 })
      .then(data => {
        if(data.error) throw new Error(data.error + " (HTTP " + (data._status||"?") + " · " + (data._path||"/search") + ")");
        setResults(data.quotes || []);
        if((data.quotes || []).length === 0) setError("Aucun résultat pour « " + q2 + " »");
      })
      .catch(e => { setResults([]); setError("Erreur : " + e.message); })
      .finally(() => setLoading(false));
  };

  const onChange = (v) => {
    setQuery(v);
    if(timer.current) clearTimeout(timer.current);
    timer.current = setTimeout(() => doSearch(v), 200);
  };

  return (
    <div style={{position:"relative"}}>
      <div style={{display:"flex", gap:6}}>
        <input value={query} onChange={e=>onChange(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter") doSearch(query); }}
          placeholder="Rechercher : Nvidia, TotalEnergies, Bitcoin…"
          style={{flex:1, background:C.bg2, border:`1px solid ${C.border}`, borderRadius:10,
            padding:"11px 13px", color:C.text, fontSize:14, outline:"none"}}/>
        <button onClick={()=>doSearch(query)} disabled={loading || query.length < 2}
          style={{padding:"0 14px", borderRadius:10, background:C.teal, border:"none",
            color:"#001018", fontSize:15, fontWeight:800,
            cursor:query.length<2?"default":"pointer", opacity:query.length<2?0.5:1}}>
          {loading ? <span className="spin" style={{display:"inline-block"}}>↻</span> : "🔍"}
        </button>
      </div>
      {error && <div style={{fontSize:11, color:C.red, marginTop:5}}>{error}</div>}
      {results.length > 0 && (
        <div style={{background:C.bg2, borderRadius:10, border:`1px solid ${C.teal}66`,
          marginTop:6, overflow:"hidden", position:"absolute", left:0, right:0, zIndex:50,
          boxShadow:"0 12px 30px #000a"}}>
          {results.map((q, i) => {
            const isEU = EU_SUFFIXES.some(s => q.symbol.endsWith(s));
            return (
              <div key={i} onClick={()=>{
                const base = q.symbol.includes(".") ? q.symbol.split(".")[0] : q.symbol;
                const cat  = (CG_MAP[base] || q.quoteType === "CRYPTOCURRENCY") ? "Crypto" : "";
                onSelect({ ticker:base, yahooSym:q.symbol, name:q.shortname,
                  currency:isEU?"EUR":"USD", cat });
                setQuery(""); setResults([]);
              }} style={{padding:"10px 13px", cursor:"pointer",
                borderBottom: i<results.length-1 ? `1px solid ${C.border}44` : "none",
                display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:13, fontWeight:800, color:C.teal}}>{q.symbol}</div>
                  <div style={{fontSize:11, color:C.text2, maxWidth:230, overflow:"hidden",
                    textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{q.shortname}</div>
                </div>
                <div style={{textAlign:"right", flexShrink:0}}>
                  <div style={{fontSize:10, color:C.gray}}>{q.exchange}</div>
                  <div style={{fontSize:9, color:isEU?C.blue:C.green}}>{isEU?"🇪🇺 EUR":"🇺🇸 USD"}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── Logo / icône ticker ────────────────────────────────────────────────── */
function Logo({ src, ticker, size=30 }){
  const [err, setErr] = useState(false);
  if(src && !err) return (
    <img src={src} alt={ticker} onError={()=>setErr(true)}
      style={{width:size, height:size, borderRadius:7, objectFit:"contain",
        background:C.bg2, border:`1px solid ${C.border}`, flexShrink:0}}/>
  );
  return (
    <div style={{width:size, height:size, borderRadius:7, background:C.bg3,
      border:`1px solid ${C.border}`, display:"flex", alignItems:"center",
      justifyContent:"center", flexShrink:0, fontSize:size*0.42, fontWeight:800, color:C.text2}}>
      {ticker.slice(0,2)}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════
   FICHE D'INVESTISSEMENT — basée sur le TickerModal de l'app d'origine
   + thèse éditable + alertes + bouton watchlist
   ════════════════════════════════════════════════════════════════════════ */
function InvestSheet({ entry, eur, usdEur, inList, onClose, onAddToList, onRemoveFromList,
                       savedThesis, savedAlert, onSaveThesis, onSaveAlert }){
  const isCrypto = isCryptoEntry(entry);
  const cgId  = CG_MAP[entry.ticker] || entry.ticker.toLowerCase();
  const yfSym = entry.yahooSym || YF_MAP[entry.ticker] || entry.ticker;

  const [tf, setTf]           = useState(2);
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState(null);
  const [dragY, setDragY]     = useState(0);
  const [crosshair, setCrosshair] = useState(null);
  const [holdingsOpen, setHoldingsOpen] = useState(false);
  const [tab, setTab]         = useState("info"); // info | these
  const cgMetaRef = useRef(null);
  const touchStartY = useRef(null);
  const sheetRef = useRef(null);
  const svgRef = useRef(null);

  // Thèse locale (édition contrôlée, sauvegarde au blur)
  const [these, setThese] = useState(savedThesis || {
    summary:"", catalysts:"", risks:"", conviction:"Moyenne", target:"", horizon:""
  });
  const [alert, setAlert] = useState(savedAlert || { above:"", below:"" });

  useEffect(()=>{
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return ()=>{ document.body.style.overflow = prev; };
  },[]);

  const fetchChart = useCallback(async (tfIdx)=>{
    setLoading(true); setErr(null);
    try {
      const { interval, range } = TF_CONFIG[tfIdx];
      if(isCrypto){
        let meta = cgMetaRef.current;
        if(!meta){
          meta = await cf("/coingecko-coin?id=" + encodeURIComponent(cgId) +
            "&symbol=" + encodeURIComponent(entry.ticker), { timeout:15000 });
          if(meta.error) throw new Error("CoinGecko ["+cgId+"] : " + meta.error);
          cgMetaRef.current = meta;
        }
        const od = await cf("/yahoo-chart?symbol=" + encodeURIComponent(yfSym) +
          "&interval=" + interval + "&range=" + range + "&no_logo=1", { timeout:12000 });
        setData({ ...meta, candles: od.candles || [] });
      } else {
        const d = await cf("/yahoo-chart?symbol=" + encodeURIComponent(yfSym) +
          "&interval=" + interval + "&range=" + range, { timeout:12000 });
        if(d.error) throw new Error(d.error);
        setData(d);
      }
    } catch(e){ setErr(e.message); }
    finally { setLoading(false); }
  }, [cgId, yfSym, isCrypto, entry.ticker]);

  useEffect(()=>{ fetchChart(tf); }, [tf, fetchChart]);

  // ── Valeurs dérivées ──
  const price     = data && data.price;
  const prevClose = data && data.prevClose;
  const currency  = (data && data.currency) || entry.currency || "USD";
  const cur       = eur ? "€" : sym(currency);
  const priceDisp = cvPrice(price, currency, eur, usdEur);
  const pnl1d = (price != null && prevClose != null)
    ? cvPrice(price, currency, eur, usdEur) - cvPrice(prevClose, currency, eur, usdEur) : null;
  const pct1d = (data && data.pct1d != null) ? data.pct1d/100
    : (price != null && prevClose != null && prevClose !== 0)
      ? (normPrice(price,currency) - normPrice(prevClose,currency)) / normPrice(prevClose,currency) : null;

  const rawQT = (data && data.quoteType) || "";
  const nameL = ((data && data.name) || "").toLowerCase();
  const quoteType = (rawQT === "EQUITY" && ["etc","etf","ucits","physical","tracker",
    "amundi","ishares","lyxor","xtrackers"].some(k=>nameL.includes(k))) ? "ETF" : rawQT;
  const sector = (data && data.sector) || "";
  const cc   = (data && data.exchangeCC) || (isCrypto ? "CRYPTO" : "US");
  const flag = FLAG[cc] || "🏳️";

  // ── Chart geometry ──
  const candles = (data && data.candles) || [];
  const closes  = candles.map(c=>c.c).filter(v=>v!=null);
  const W=320, H=120, PAD=6;
  const minV = closes.length ? Math.min(...closes) : 0;
  const maxV = closes.length ? Math.max(...closes) : 1;
  const rng  = (maxV - minV) || 1;
  const toY  = v => PAD + (1-(v-minV)/rng)*(H-PAD*2);
  const toX  = (i,n) => PAD + (i/(n-1||1))*(W-PAD*2);
  const pts  = closes.map((v,i)=>toX(i,closes.length)+","+toY(v)).join(" ");
  const isUp = closes.length >= 2 ? closes[closes.length-1] >= closes[0] : true;
  const lineColor = isUp ? C.green : C.red;
  const fmtTs = ts => {
    const d = new Date(ts); const lbl = TF_CONFIG[tf].label;
    if(lbl==="1J") return d.getHours().toString().padStart(2,"0")+"h";
    if(["1S","1M"].includes(lbl)) return d.getDate()+"/"+(d.getMonth()+1);
    return (d.getMonth()+1)+"/"+d.getFullYear().toString().slice(2);
  };
  const xIdxs = closes.length > 1
    ? [0, Math.floor(closes.length/3), Math.floor(2*closes.length/3), closes.length-1]
        .filter((v,i,a)=>a.indexOf(v)===i) : [];

  // News tri par pertinence
  const sortedNews = useMemo(()=>{
    const arr = (data && data.news) || []; if(!arr.length) return [];
    const tk = entry.ticker.toLowerCase();
    const nameWords = ((data&&data.name)||"").toLowerCase().split(" ").filter(w=>w.length>3);
    return [...arr].sort((a,b)=>{
      const sc = n => { const t=(n.title||"").toLowerCase(); let s=0;
        if(t.includes(tk)) s+=10; nameWords.forEach(w=>{ if(t.includes(w)) s+=3; }); return s; };
      return sc(b)-sc(a);
    });
  }, [data, entry.ticker]);

  // Swipe-to-close
  const onTS = e => { touchStartY.current = e.touches[0].clientY; setDragY(0); };
  const onTM = e => {
    const dy = e.touches[0].clientY - (touchStartY.current || 0);
    const atTop = sheetRef.current && sheetRef.current.scrollTop <= 2;
    if(dy > 0 && (atTop || dy > 60)){ e.preventDefault(); setDragY(dy*0.75); }
  };
  const onTE = () => { if(dragY > 50) onClose(); else setDragY(0); touchStartY.current=null; };

  // Crosshair
  const hitTest = (clientX) => {
    const svgEl = svgRef.current; if(!svgEl || !closes.length) return null;
    const rect = svgEl.getBoundingClientRect();
    const relX = (clientX-rect.left)/rect.width*W;
    let best=0, bd=Infinity;
    for(let i=0;i<closes.length;i++){ const d=Math.abs(toX(i,closes.length)-relX); if(d<bd){bd=d;best=i;} }
    return { i:best, x:toX(best,closes.length), y:toY(closes[best]), price:closes[best], ts:candles[best]&&candles[best].t };
  };

  const saveTheseNow = () => onSaveThesis(entry, these);
  const saveAlertNow = () => onSaveAlert(entry, {
    above: alert.above === "" ? null : parseFloat(alert.above),
    below: alert.below === "" ? null : parseFloat(alert.below),
  });

  const QT_COLOR = { EQUITY:C.green, ETF:C.blue, MUTUALFUND:C.purple,
    CRYPTOCURRENCY:C.btc, CRYPTO:C.btc, INDEX:C.gray };

  const cases = isCrypto ? [
    { label:"Cap. marché", value: fmtBig(data&&data.marketCap, "$"), color:C.text, dash:!(data&&data.marketCap) },
    { label:"Vol. 24h",    value: fmtVol(data&&data.volume24h),       color:C.text2, dash:!(data&&data.volume24h) },
    { label:"ATH",         value: (data&&data.ath) ? "$"+(data.ath>=1000?Math.round(data.ath).toLocaleString("fr-FR"):data.ath.toFixed(2))
        + (data.athChangesPct!=null?" ("+data.athChangesPct.toFixed(0)+"%)":"") : null,
      color: (data&&data.athChangesPct!=null&&data.athChangesPct>=-15)?C.green:C.text3, dash:!(data&&data.ath) },
  ] : [
    { label: (quoteType==="ETF" && !(data&&data.marketCap)) ? "AUM" : "Cap. boursière",
      value: fmtBig(data&&data.marketCap, eur?"€":"$"), color:C.text, dash:!(data&&data.marketCap) },
    { label:"Vol. moyen", value: fmtVol(data&&data.volAvg), color:C.text2, dash:!(data&&data.volAvg) },
    { label:"Dernier div.", value:(eur?"€":"$")+((data&&data.lastDiv!=null)?Number(data.lastDiv).toFixed(2):"0.00"),
      color:(data&&data.lastDiv>0)?C.green:C.text3, sub:(data&&data.lastDivDate)||null, dash:false },
  ];

  const fieldStyle = { width:"100%", background:C.bg2, border:`1px solid ${C.border}`,
    borderRadius:9, padding:"9px 11px", color:C.text, fontSize:13, outline:"none", marginTop:5 };
  const labelStyle = { fontSize:10, fontWeight:700, color:C.text2, textTransform:"uppercase", letterSpacing:0.4 };

  return (
    <div onClick={onClose} style={{position:"fixed", inset:0, zIndex:1000,
      background:`rgba(0,0,0,${Math.max(0,0.78-dragY/300)})`, display:"flex", alignItems:"flex-end"}}>
      <div ref={sheetRef} onClick={e=>e.stopPropagation()}
        onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
        style={{width:"100%", maxWidth:480, margin:"0 auto", background:C.bg0,
          borderRadius:"20px 20px 0 0", paddingBottom:30, maxHeight:"92vh", overflowY:"auto",
          transform:`translateY(${dragY}px)`,
          transition: dragY===0 ? "transform .25s cubic-bezier(.32,.72,0,1)" : "none",
          WebkitOverflowScrolling:"touch"}}>

        {/* poignée */}
        <div style={{display:"flex", justifyContent:"center", padding:"12px 0 6px"}}>
          <div style={{width:38, height:4, borderRadius:2,
            background:dragY>50?C.red:C.border, transform:`scaleX(${1+dragY/200})`}}/>

/* ─── Ligne de watchlist ─────────────────────────────────────────────────── */
function WatchRow({ item, quote, eur, usdEur, onClick, onRemove }){
  const currency = (quote && quote.currency) || item.currency || "USD";
  const price = quote && quote.price;
  const priceDisp = cvPrice(price, currency, eur, usdEur);
  const pct = (quote && quote.price != null && quote.prevClose != null && quote.prevClose !== 0)
    ? (normPrice(quote.price,currency)-normPrice(quote.prevClose,currency))/normPrice(quote.prevClose,currency) : null;

  // Alerte déclenchée ?
  let alertHit = null;
  if(quote && quote.price != null && item.alert){
    const n = normPrice(quote.price, currency);
    if(item.alert.above != null && n >= item.alert.above) alertHit = "up";
    else if(item.alert.below != null && n <= item.alert.below) alertHit = "down";
  }
  const hasAlert = item.alert && (item.alert.above != null || item.alert.below != null);

  return (
    <div onClick={onClick} style={{display:"flex", alignItems:"center", gap:11, padding:"12px 14px",
      cursor:"pointer", borderBottom:`1px solid ${C.border}`,
      background: alertHit ? (alertHit==="up"?C.green+"12":C.red+"12") : "transparent",
      borderLeft: alertHit ? `3px solid ${alertHit==="up"?C.green:C.red}` : "3px solid transparent"}}>
      <Logo src={item.logoUrl} ticker={item.ticker} size={34}/>
      <div style={{flex:1, minWidth:0}}>
        <div style={{display:"flex", alignItems:"center", gap:6}}>
          <span style={{fontSize:15, fontWeight:800, color:C.text}}>{item.ticker}</span>
          {hasAlert && <span style={{fontSize:11}} title="Alerte active">🔔</span>}
          {item.these && item.these.conviction && (
            <span style={{fontSize:8, fontWeight:700, padding:"1px 6px", borderRadius:4,
              background:C.teal+"18", color:C.teal}}>{item.these.conviction[0]}</span>)}
        </div>
        <div style={{fontSize:11, color:C.text2, overflow:"hidden", textOverflow:"ellipsis",
          whiteSpace:"nowrap", maxWidth:200}}>{item.name || (quote&&quote.name) || "—"}</div>
      </div>
      <div style={{textAlign:"right", flexShrink:0}}>
        <div style={{fontSize:15, fontWeight:800, color:C.text}}>
          {quote === undefined ? <span className="pulse" style={{color:C.text3}}>…</span> : fmtPrice(priceDisp, eur?"EUR":currency)}
        </div>
        {pct != null && <div style={{fontSize:11, fontWeight:700, color:pct>=0?C.green:C.red}}>{fmtPct(pct)}</div>}
        {alertHit && <div style={{fontSize:8, fontWeight:700, color:alertHit==="up"?C.green:C.red}}>
          {alertHit==="up"?"▲ seuil haut":"▼ seuil bas"}</div>}
      </div>
      <button onClick={e=>{ e.stopPropagation(); onRemove(); }} style={{background:"transparent",
        border:"none", color:C.text3, fontSize:16, cursor:"pointer", padding:"0 2px", flexShrink:0}}>✕</button>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════
   DIAGNOSTIC — teste /ping et /search, explique précisément l'erreur (v1.01)
   ════════════════════════════════════════════════════════════════════════ */
function DiagnosticPanel({ onClose }){
  const [running, setRunning] = useState(true);
  const [ping, setPing]   = useState(null);   // {status, body, err}
  const [srch, setSrch]   = useState(null);   // {status, body, err}

  const keyMask = CF_AUTH_KEY
    ? (CF_AUTH_KEY.length <= 2 ? "•".repeat(CF_AUTH_KEY.length)
        : CF_AUTH_KEY[0] + "•".repeat(Math.max(1,CF_AUTH_KEY.length-2)) + CF_AUTH_KEY[CF_AUTH_KEY.length-1])
    : "(vide !)";

  const run = useCallback(async ()=>{
    setRunning(true); setPing(null); setSrch(null);
    // 1) /ping — SANS auth (diagnostic pur)
    try {
      const r = await fetch(CF_WORKER_URL + "/ping", { signal: AbortSignal.timeout(8000) });
      const b = await r.json().catch(()=>({}));
      setPing({ status:r.status, body:b });
    } catch(e){ setPing({ err: e.name === "TimeoutError" ? "délai dépassé" : (e.message||e.name) }); }
    // 2) /search?q=AAPL — AVEC auth
    try {
      const r = await fetch(CF_WORKER_URL + "/search?q=AAPL", {
        headers:{ "X-Auth-Key": CF_AUTH_KEY }, signal: AbortSignal.timeout(8000) });
      const b = await r.json().catch(()=>({}));
      setSrch({ status:r.status, body:b });
    } catch(e){ setSrch({ err: e.name === "TimeoutError" ? "délai dépassé" : (e.message||e.name) }); }
    setRunning(false);
  }, []);
  useEffect(()=>{ run(); }, [run]);

  // Verdict
  let verdict = null, vColor = C.text2;
  if(!running){
    if(ping && ping.err){ verdict = "Le Worker ne répond pas. Vérifie l'URL (CF_WORKER_URL) — elle doit finir par .workers.dev, sans slash, et exister."; vColor = C.red; }
    else if(ping && ping.body && ping.body.hasAuth === false){ verdict = "AUTH_KEY n'est PAS défini sur le Worker déployé. Cloudflare → ton Worker → Settings → Variables and Secrets → Add → Type « Secret », nom AUTH_KEY, valeur = « watchlist » → puis Deploy."; vColor = C.orange; }
    else if(srch && srch.status === 401){ verdict = "AUTH_KEY existe côté Worker mais ne correspond PAS à la clé de l'app. Les deux doivent être STRICTEMENT identiques (sans espace, même casse) : CF_AUTH_KEY dans index.html = AUTH_KEY dans Cloudflare. Corrige l'un des deux, puis redéploie / réuploade."; vColor = C.orange; }
    else if(srch && srch.status === 200){ verdict = "Tout fonctionne ✓ — l'authentification passe et la recherche répond."; vColor = C.green; }
    else if(srch && srch.body && srch.body.error){ verdict = "Réponse inattendue : " + srch.body.error; vColor = C.orange; }
    if(ping && ping.body && ping.body.hasKV === false){
      verdict = (verdict ? verdict + "  " : "") + "⚠ Le binding KV (GDB_KV) manque : la recherche peut marcher, mais l'enregistrement de la watchlist échouera. Ajoute-le dans Settings → Bindings.";
      if(vColor === C.green) vColor = C.orange;
    }
  }

  const Row = ({label, children}) => (
    <div style={{display:"flex", justifyContent:"space-between", gap:10, padding:"6px 0",
      borderBottom:`1px solid ${C.border}`, fontSize:12}}>
      <span style={{color:C.text3}}>{label}</span>
      <span style={{color:C.text, fontWeight:600, textAlign:"right", wordBreak:"break-all"}}>{children}</span>
    </div>
  );
  const Bool = ({v}) => <span style={{color: v===true?C.green:(v===false?C.red:C.text3), fontWeight:800}}>{v===true?"✓ oui":(v===false?"✗ non":"?")}</span>;

  return (
    <div onClick={onClose} style={{position:"fixed", inset:0, zIndex:1100,
      background:"rgba(0,0,0,0.8)", display:"flex", alignItems:"flex-end"}}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%", maxWidth:480, margin:"0 auto",
        background:C.bg0, borderRadius:"20px 20px 0 0", padding:"18px 18px 28px", maxHeight:"92vh", overflowY:"auto"}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14}}>
          <span style={{fontSize:17, fontWeight:900}}>🩺 Diagnostic</span>
          <button onClick={onClose} style={{background:"transparent", border:"none", color:C.gray, fontSize:21, cursor:"pointer"}}>✕</button>
        </div>

        {/* Verdict */}
        <div style={{background:vColor+"15", border:`1px solid ${vColor}55`, borderRadius:12,
          padding:"12px 14px", marginBottom:16, fontSize:13, color:vColor, lineHeight:1.5, fontWeight:600}}>
          {running ? <span className="pulse">Tests en cours…</span> : (verdict || "—")}
        </div>

        {/* Config */}
        <div style={{fontSize:10, fontWeight:700, color:C.gray, textTransform:"uppercase", letterSpacing:0.5, marginBottom:4}}>Configuration de l'app</div>
        <Row label="Worker URL">{CF_WORKER_URL}</Row>
        <Row label="Clé app (CF_AUTH_KEY)">{keyMask} <span style={{color:C.text3, fontWeight:400}}>({CF_AUTH_KEY.length} car.)</span></Row>

        {/* /ping */}
        <div style={{fontSize:10, fontWeight:700, color:C.gray, textTransform:"uppercase", letterSpacing:0.5, margin:"14px 0 4px"}}>Test /ping (sans clé)</div>
        {ping == null ? <div style={{fontSize:12, color:C.text3}} className="pulse">…</div> : ping.err ? (
          <Row label="Résultat"><span style={{color:C.red}}>{ping.err}</span></Row>
        ) : (<>
          <Row label="HTTP">{ping.status}</Row>
          <Row label="KV branché (hasKV)"><Bool v={ping.body && ping.body.hasKV}/></Row>
          <Row label="AUTH_KEY défini (hasAuth)"><Bool v={ping.body && ping.body.hasAuth}/></Row>
        </>)}

        {/* /search */}
        <div style={{fontSize:10, fontWeight:700, color:C.gray, textTransform:"uppercase", letterSpacing:0.5, margin:"14px 0 4px"}}>Test /search?q=AAPL (avec clé)</div>
        {srch == null ? <div style={{fontSize:12, color:C.text3}} className="pulse">…</div> : srch.err ? (
          <Row label="Résultat"><span style={{color:C.red}}>{srch.err}</span></Row>
        ) : (<>
          <Row label="HTTP">{srch.status === 200
            ? <span style={{color:C.green}}>200 OK</span>
            : <span style={{color:C.red}}>{srch.status}</span>}</Row>
          <Row label="Réponse">{srch.body && srch.body.error
            ? <span style={{color:C.red}}>{srch.body.error}</span>
            : <span style={{color:C.green}}>{((srch.body && srch.body.quotes)||[]).length} résultat(s)</span>}</Row>
        </>)}

        <button onClick={run} disabled={running} style={{width:"100%", marginTop:18, padding:"12px",
          borderRadius:11, background:C.teal, border:"none", color:"#001018", fontSize:14, fontWeight:800,
          cursor:running?"default":"pointer", opacity:running?0.5:1}}>
          {running ? "Test…" : "↻ Relancer le diagnostic"}
        </button>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════
   APP
   ════════════════════════════════════════════════════════════════════════ */
function App(){
  const [items, setItems]   = useState(()=> (readLocal() && readLocal().items) || []);
  const [quotes, setQuotes] = useState({});   // ticker -> {price, prevClose, name, currency, logoUrl}
  const [sheet, setSheet]   = useState(null);  // entry ouverte
  const [eur, setEur]       = useState(false);
  const [usdEur, setUsdEur] = useState(()=> (readLocal() && readLocal().usdEur) || 0.92);
  const [refreshing, setRefreshing] = useState(false);
  const [booted, setBooted] = useState(false);
  const [showDiag, setShowDiag] = useState(false);

  // Persiste à chaque changement d'items
  const persist = useCallback((nextItems)=>{
    writeLocal({ items: nextItems, usdEur });
  }, [usdEur]);

  // Boot : lit le KV (cloud) — adopte si le local est vide
  useEffect(()=>{
    cf("/read", { timeout:9000 }).then(d=>{
      if(d && d.gdb_watchlist && Array.isArray(d.gdb_watchlist.items)){
        setItems(prev => prev.length ? prev : d.gdb_watchlist.items);
      }
    }).catch(()=>{}).finally(()=>setBooted(true));
    // Taux EUR/USD (EUR par USD)
    cf("/yahoo?symbol=USDEUR=X", { timeout:8000 }).then(d=>{
      if(d && d.price && d.price > 0.5 && d.price < 1.5){ setUsdEur(d.price); }
    }).catch(()=>{});
  }, []);

  // Rafraîchit les prix de tous les items
  const refreshQuotes = useCallback(async (list)=>{
    const arr = list || items;
    if(!arr.length){ setQuotes({}); return; }
    setRefreshing(true);
    await Promise.all(arr.map(async (it)=>{
      const yf = it.yahooSym || YF_MAP[it.ticker] || it.ticker;
      try {
        const d = await cf("/yahoo-chart?symbol=" + encodeURIComponent(yf) +
          "&interval=1d&range=5d&no_logo=1", { timeout:10000 });
        setQuotes(q => ({ ...q, [it.ticker]: {
          price: d.price, prevClose: d.prevClose, name: d.name,
          currency: d.currency || it.currency, marketState: d.marketState,
        }}));
      } catch(e){ setQuotes(q => ({ ...q, [it.ticker]: { price:null, currency:it.currency } })); }
    }));
    setRefreshing(false);
  }, [items]);

  useEffect(()=>{ if(booted) refreshQuotes(items); /* eslint-disable-next-line */ }, [booted, items.length]);

  // Notifications best-effort
  useEffect(()=>{
    if(typeof Notification !== "undefined" && Notification.permission === "default"){
      Notification.requestPermission().catch(()=>{});
    }
  }, []);
  const notifiedRef = useRef({});
  useEffect(()=>{
    items.forEach(it=>{
      const q = quotes[it.ticker];
      if(!q || q.price == null || !it.alert) return;
      const n = normPrice(q.price, q.currency || it.currency);
      const hit = (it.alert.above != null && n >= it.alert.above) ? "up"
                : (it.alert.below != null && n <= it.alert.below) ? "down" : null;
      const key = it.ticker + ":" + hit;
      if(hit && !notifiedRef.current[key]){
        notifiedRef.current[key] = true;
        if(typeof Notification !== "undefined" && Notification.permission === "granted"){
          try { new Notification("Alerte " + it.ticker,
            { body: (hit==="up"?"≥ seuil haut · ":"≤ seuil bas · ") + fmtPrice(n, q.currency||it.currency) }); } catch(e){}
        }
      }
      if(!hit){ delete notifiedRef.current[it.ticker+":up"]; delete notifiedRef.current[it.ticker+":down"]; }
    });
  }, [quotes, items]);

  // Actions
  const addItem = (entry) => {
    setItems(prev=>{
      if(prev.some(p=>p.ticker===entry.ticker)) return prev;
      const next = [...prev, {
        ticker:entry.ticker, yahooSym:entry.yahooSym || YF_MAP[entry.ticker] || entry.ticker,
        name:entry.name, currency:entry.currency || "USD", cat:entry.cat || "",
        logoUrl:entry.logoUrl || null, alert:null, these:null, addedAt:Date.now(),
      }];
      persist(next);
      return next;
    });
  };
  const removeItem = (entry) => {
    setItems(prev=>{ const next = prev.filter(p=>p.ticker!==entry.ticker); persist(next); return next; });
  };
  const saveThesis = (entry, these) => {
    setItems(prev=>{
      const next = prev.map(p=> p.ticker===entry.ticker ? {...p, these} : p);
      persist(next); return next;
    });
  };
  const saveAlert = (entry, alert) => {
    setItems(prev=>{
      const next = prev.map(p=> p.ticker===entry.ticker ? {...p, alert} : p);
      persist(next); return next;
    });
  };

  const sheetItem  = sheet ? items.find(i=>i.ticker===sheet.ticker) : null;
  const inList     = !!sheetItem;

  return (
    <div style={{minHeight:"100vh", background:C.bg, color:C.text}}>
      {/* HEADER */}
      <div style={{position:"sticky", top:0, zIndex:40, background:C.bg+"f2",
        backdropFilter:"blur(12px)", padding:"16px 16px 12px"}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12}}>
          <div>
            <div style={{fontSize:21, fontWeight:900, letterSpacing:-0.5}}>Watchlist <span style={{color:C.teal}}>& Thèses</span></div>
            <div style={{fontSize:10, color:C.gray, fontFamily:"monospace"}}>{APP_VERSION} · {items.length} suivi{items.length>1?"s":""}</div>
          </div>
          <div style={{display:"flex", gap:8}}>
            <button onClick={()=>setShowDiag(true)} title="Diagnostic" style={{width:38, height:38, borderRadius:10,
              border:`1.5px solid ${C.border2}`, background:C.bg2, color:C.purple, fontSize:16, cursor:"pointer"}}>
              🩺</button>
            <button onClick={()=>setEur(e=>!e)} style={{width:38, height:38, borderRadius:10,
              border:`1.5px solid ${eur?C.green:C.border2}`, background:C.bg2,
              color:eur?C.green:C.gold, fontSize:15, fontWeight:800, cursor:"pointer"}}>
              {eur?"€":"$"}</button>
            <button onClick={()=>refreshQuotes(items)} style={{width:38, height:38, borderRadius:10,
              border:`1.5px solid ${C.border2}`, background:C.bg2, color:C.teal, fontSize:17, cursor:"pointer"}}>
              <span className={refreshing?"spin":""} style={{display:"inline-block"}}>↺</span></button>
          </div>
        </div>
        {/* RECHERCHE */}
        <TickerSearch onSelect={(entry)=>setSheet(entry)}/>
      </div>

      {/* WATCHLIST */}
      <div>
        {items.length === 0 ? (
          <div style={{padding:"60px 30px", textAlign:"center", color:C.text3}}>
            <div style={{fontSize:40, marginBottom:14}}>★</div>
            <div style={{fontSize:14, color:C.text2, fontWeight:600, marginBottom:6}}>Watchlist vide</div>
            <div style={{fontSize:12, lineHeight:1.5}}>Recherche un ticker ci-dessus, ouvre sa fiche,
              puis appuie sur « Ajouter à la watchlist ». Tu pourras y noter ta thèse et fixer des alertes de prix.</div>
          </div>
        ) : (
          items.map(it=>(
            <WatchRow key={it.ticker} item={it} quote={quotes[it.ticker]}
              eur={eur} usdEur={usdEur}
              onClick={()=>setSheet({ ticker:it.ticker, yahooSym:it.yahooSym, name:it.name, currency:it.currency, cat:it.cat })}
              onRemove={()=>removeItem(it)}/>
          ))
        )}
      </div>

      {/* note connecteur */}
      <div style={{padding:"18px 16px 30px", fontSize:9, color:C.text3, textAlign:"center", lineHeight:1.5}}>
        Données via Worker Cloudflare · Yahoo Finance · CoinGecko<br/>
        {CF_WORKER_URL.replace("https://","")}
      </div>

      {showDiag && <DiagnosticPanel onClose={()=>setShowDiag(false)}/>}

      {/* FICHE */}
      {sheet && (
        <InvestSheet entry={sheet} eur={eur} usdEur={usdEur} inList={inList}
          savedThesis={sheetItem && sheetItem.these} savedAlert={sheetItem && sheetItem.alert ? {
            above: sheetItem.alert.above==null?"":sheetItem.alert.above,
            below: sheetItem.alert.below==null?"":sheetItem.alert.below } : null}
          onClose={()=>setSheet(null)}
          onAddToList={(e)=>addItem(e)}
          onRemoveFromList={(e)=>{ removeItem(e); }}
          onSaveThesis={saveThesis}
          onSaveAlert={saveAlert}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
