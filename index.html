  <title>J.C. GLOBAL INVESTMENTS</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0A0A0C;overflow-x:hidden;font-family:'Inter',-apple-system,sans-serif}
    #root{min-height:100vh}
    #loader{
      position:fixed;inset:0;
      background:radial-gradient(120% 80% at 50% 38%, #15130C 0%, #0A0A0C 56%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:30px;z-index:9999;transition:opacity .55s ease;
    }
    .mono-wrap{position:relative;width:128px;height:128px;display:flex;align-items:center;justify-content:center;}
    .mono-glow{position:absolute;inset:-42%;border-radius:50%;background:radial-gradient(circle,rgba(201,168,106,.30) 0%,transparent 62%);animation:breathe 3.6s ease-in-out infinite;}
    .ring{position:absolute;inset:0;border-radius:50%;border:1px solid #C9A86A;opacity:0;animation:ringIn 1.6s ease-out forwards;}
    .ring2{position:absolute;inset:11px;border-radius:50%;border:1px solid rgba(201,168,106,.22);opacity:0;animation:ringIn 1.8s .15s ease-out forwards;}
    .mono{position:relative;z-index:2;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:54px;letter-spacing:1px;color:#C9A86A;opacity:0;animation:monoIn 1.8s ease-out forwards;}
    .mono .d{color:#E6CF9B;}
    .wordmark{font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:25px;letter-spacing:7px;text-indent:7px;color:#F3EFE6;text-align:center;line-height:1.5;opacity:0;animation:fadeUp 1.6s .5s ease-out forwards;}
    .wordmark b{font-weight:500;color:#E6CF9B;}
    .bar{width:190px;height:1px;background:#2A2A31;position:relative;overflow:hidden;opacity:0;animation:fadeUp 1.4s .7s ease-out forwards;}
    .bar i{position:absolute;left:0;top:0;height:100%;width:0%;background:linear-gradient(90deg,#8C6F3F,#C9A86A,#E6CF9B);transition:width .25s ease-out;}
    .pct{font-size:10px;letter-spacing:4px;color:#9A958A;font-variant-numeric:tabular-nums;opacity:0;animation:fadeUp 1.4s .8s ease-out forwards;}
    .tagline{font-size:9px;letter-spacing:5px;color:#5C584F;text-transform:uppercase;opacity:0;animation:fadeUp 1.4s .9s ease-out forwards;}
    @keyframes breathe{0%,100%{opacity:.65;transform:scale(.95)}50%{opacity:1;transform:scale(1.06)}}
    @keyframes ringIn{0%{opacity:0;transform:scale(.7)}100%{opacity:.55;transform:scale(1)}}
    @keyframes monoIn{0%{opacity:0;transform:scale(.85);text-shadow:0 0 0 rgba(201,168,106,0)}100%{opacity:1;transform:scale(1);text-shadow:0 0 20px rgba(201,168,106,.5)}}
    .logo-wrap{display:flex;justify-content:center;margin-bottom:26px;}
    .app-logo{width:150px;height:150px;border-radius:50%;object-fit:cover;opacity:0;animation:fadeUp 1.5s .3s ease-out forwards;filter:drop-shadow(0 6px 26px rgba(230,207,155,.28));}
    @keyframes fadeUp{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
  </style>
